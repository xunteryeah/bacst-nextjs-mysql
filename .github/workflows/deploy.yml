name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/apps

            # Clone or update the repository using GitHub token
            REPO_URL="https://xunteryeah:${{ secrets.GH_TOKEN }}@github.com/xunteryeah/bacst-nextjs-mysql.git"
            
            if [ -d "bacst-nextjs-mysql/.git" ]; then
              cd bacst-nextjs-mysql
              git fetch origin main
              git reset --hard origin/main
            else
              rm -rf bacst-nextjs-mysql
              git clone $REPO_URL
              cd bacst-nextjs-mysql
            fi

            # Create .env file with secrets
            cat > .env << 'ENVEOF'
            ENVEOF
            echo "MYSQL_HOST=${{ secrets.MYSQL_HOST }}" >> .env
            echo "MYSQL_PORT=${{ secrets.MYSQL_PORT }}" >> .env
            echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "ADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }}" >> .env
            echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
            echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
            echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env
            echo "TENCENT_COS_SECRET_ID=${{ secrets.TENCENT_COS_SECRET_ID }}" >> .env
            echo "TENCENT_COS_SECRET_KEY=${{ secrets.TENCENT_COS_SECRET_KEY }}" >> .env
            echo "TENCENT_COS_BUCKET=${{ secrets.TENCENT_COS_BUCKET }}" >> .env
            echo "TENCENT_COS_REGION=${{ secrets.TENCENT_COS_REGION }}" >> .env

            # Ensure MySQL is up and healthy before running migrations
            docker compose up -d mysql
            for i in $(seq 1 30); do
              if docker compose exec -T mysql mysqladmin ping -h localhost --silent >/dev/null 2>&1; then
                echo "MySQL is ready"
                break
              fi
              echo "Waiting for MySQL... ($i/30)"
              sleep 2
            done

            # Run idempotent DB migrations (safe to re-run every deploy)
            for migration in sql/migration-*.sql; do
              [ -f "$migration" ] || continue
              echo "Applying $migration"
              docker compose exec -T mysql sh -c 'exec mysql -uroot -p"$MYSQL_ROOT_PASSWORD" bacst' < "$migration"
            done

            # Build and start containers
            docker compose build --no-cache
            docker compose up -d

            # Wait for container to start
            sleep 15

            # Health check
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ || true)
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            docker logs bacst-nextjs-mysql --tail 30
            exit 1