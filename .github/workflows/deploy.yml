name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/apps

            # Clone or pull the latest code
            if [ -d "bacst-nextjs-mysql/.git" ]; then
              cd bacst-nextjs-mysql
              git fetch origin main
              git reset --hard origin/main
            else
              rm -rf bacst-nextjs-mysql
              git clone https://github.com/xunteryeah/bacst-nextjs-mysql.git
              cd bacst-nextjs-mysql
            fi

            # Create .env file with secrets
            cat > .env << 'ENVEOF'
            ENVEOF
            echo "MYSQL_HOST=${{ secrets.MYSQL_HOST }}" >> .env
            echo "MYSQL_PORT=${{ secrets.MYSQL_PORT }}" >> .env
            echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "ADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }}" >> .env
            echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
            echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
            echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env
            echo "TENCENT_COS_SECRET_ID=${{ secrets.TENCENT_COS_SECRET_ID }}" >> .env
            echo "TENCENT_COS_SECRET_KEY=${{ secrets.TENCENT_COS_SECRET_KEY }}" >> .env
            echo "TENCENT_COS_BUCKET=${{ secrets.TENCENT_COS_BUCKET }}" >> .env
            echo "TENCENT_COS_REGION=${{ secrets.TENCENT_COS_REGION }}" >> .env

            # Build and start containers
            docker compose build --no-cache
            docker compose up -d

            # Wait for container to start
            sleep 15

            # Health check
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ || true)
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            docker logs bacst-nextjs-mysql --tail 30
            exit 1