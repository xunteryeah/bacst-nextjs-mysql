name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t bacst-nextjs-mysql:${{ github.sha }} .
          echo "Image built successfully"
          docker images bacst-nextjs-mysql:${{ github.sha }}

      - name: Smoke test
        run: |
          docker run -d --name smoke-test -p 3000:3000 bacst-nextjs-mysql:${{ github.sha }}
          echo "Waiting for container to start..."
          sleep 8
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ || true)
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Smoke test passed (HTTP $STATUS)"
              docker stop smoke-test && docker rm smoke-test
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 3s..."
            sleep 3
          done
          echo "Smoke test failed"
          docker logs smoke-test
          docker stop smoke-test && docker rm smoke-test
          exit 1

      - name: Package image
        run: |
          docker save bacst-nextjs-mysql:${{ github.sha }} | gzip > /tmp/image.tar.gz
          ls -lh /tmp/image.tar.gz

      - name: Transfer image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "/tmp/image.tar.gz"
          target: "/tmp"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/apps/bacst-nextjs-mysql

            # Load the pre-built image
            echo "Loading Docker image..."
            docker load < /tmp/image.tar.gz
            rm -f /tmp/image.tar.gz

            # Tag for compose
            IMAGE_ID=$(docker images --format '{{.ID}}' --filter "reference=bacst-nextjs-mysql" | head -1)
            docker tag $IMAGE_ID bacst-nextjs-mysql:latest

            # Generate .env
            cat > .env << 'ENVEOF'

            ENVEOF
            sed -i 's/^ *//' .env
            echo "MYSQL_HOST=${{ secrets.MYSQL_HOST }}" >> .env
            echo "MYSQL_PORT=${{ secrets.MYSQL_PORT }}" >> .env
            echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "ADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }}" >> .env
            echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
            echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
            echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env
            echo "TENCENT_COS_SECRET_ID=${{ secrets.TENCENT_COS_SECRET_ID }}" >> .env
            echo "TENCENT_COS_SECRET_KEY=${{ secrets.TENCENT_COS_SECRET_KEY }}" >> .env
            echo "TENCENT_COS_BUCKET=${{ secrets.TENCENT_COS_BUCKET }}" >> .env
            echo "TENCENT_COS_REGION=${{ secrets.TENCENT_COS_REGION }}" >> .env

            # Deploy
            docker compose up -d --no-build


            # Cleanup
            docker image prune -f
            echo "Deployment complete"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Waiting for container to start..."
            sleep 10
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ || true)
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            docker logs bacst-nextjs-mysql --tail 30

            # Auto-cleanup on failure
            echo "Cleaning up failed deployment..."
            docker compose -f /opt/apps/bacst-nextjs-mysql/docker-compose.yml down 2>/dev/null || true
            docker image prune -f
            exit 1
